<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackComuza...</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Reset para evitar scrolls innecesarios en móviles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Space Mono', monospace; 
            background-color: #450104; /* Tu rojo oscuro */
            color: #c9d1d9; /* Un gris claro para el texto general */
            text-align: center; 
            
            /* Flexbox para centrar la tarjeta perfectamente en cualquier dispositivo */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card { 
            background: #0d1117; 
            border: 2px solid #6758bf; /* Tu color púrpura de borde */
            padding: 40px 20px; 
            border-radius: 0px; /* Mantengo tu estilo cuadrado */
            
            /* Responsividad: ancho total en móvil, máximo 600px en PC */
            width: 100%;
            max-width: 600px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5); /* Sombra sólida retro */
        }

        h1 { 
            color: #4ade80; /* Un verde neón que resalta sobre el negro */
            /* El tamaño se ajusta según la pantalla: ni muy grande ni muy chico */
            font-size: clamp(1.5rem, 8vw, 3rem); 
            margin-bottom: 20px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        p {
            color: #363c61; /* Tu azul original para el texto secundario */
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Ajuste para pantallas muy pequeñas */
        @media (max-width: 400px) {
            .card {
                padding: 20px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>¡Bienvenido a BlackSmocking!</h1>
        <p>> El gran rincón donde nadie toca pasto...</p>
    </div>
</body>
</html>
