<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackComuza MODO DIABLO</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #000000;  /* NEGRO ABSOLUTO */
            color: #ffffff;  /* BLANCO PURO */
            text-align: center; 
            padding: 50px; 
        }
        h1 { 
            color: #ff0000;  /* ROJO SATÁNICO */
            font-size: 3rem; 
            text-shadow: 2px 2px 0 #ffffff;  /* Sombra blanca para más contraste */
        }
        .card { 
            background: #ffffff;  /* BLANCO QUE QUEMA */
            border: 5px solid #ff0000;  /* BORDE ROJO GRUESO */
            padding: 20px; 
            border-radius: 0px; 
            display: inline-block; 
            box-shadow: 10px 10px 0 #ff0000;  /* Sombra roja */
        }
        .card p {
            color: #000000;  /* TEXTO NEGRO SOBRE FONDO BLANCO */
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>¡Bienvenido a BlackSmocking!</h1>
        <p>El gran rincon donde nadie toca pasto...</p>
        <p style="color: #ff0000;">⚠️ MODO ALTO CONTRASTE ⚠️</p>
    </div>
</body>
</html>
