<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Kerolmi!</title>
    
    <style>
        body {
            background-color: rgb(56, 1, 10);
            color: rgb(79, 87, 34);
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
        }

        .card, .carf, .cars {
            background-color: rgb(25, 23, 55);
            border: 1px solid rgb(79, 87, 34);
            margin: 20px auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card { border-radius: 24px; padding: 20px; max-width: 400px; }
        
        .carf { 
            border-radius: 16px; 
            min-height: 129px; 
            max-width: 800px; 
            margin: 60px auto; 
        }

        .cars { 
            border-radius: 50px; 
            max-width: 800px; 
            margin: 60px auto; 
            padding-bottom: 20px;
        }

        .apa {
            background-color: rgb(77, 77, 77);
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .caida {
            display: none;
            position: fixed;
            right: 0 !important;
            top: 50 px !important;
            left: auto !important;   
            margin: 0 !important;
            transform: none !important;
            background-color: rgb(0, 0, 0);
            min-width: 160px;
            border: 1px solid rgb(255, 255, 255);
            z-index: 100;
            text-align: left;
        }

        .caida a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }

        .caida a:hover {
            background-color: rgb(29, 15, 15);
        }

        .show {
            display: block;
        }

        .boton {
            position: fixed;
            top: 0;
            right: 0;
            margin: 0;
            z-index: 101;
            margin-left: auto;
            margin-right: 0;
            margin-bottom: 20px;
            width: fit-content;
        }
    </style>
</head>
<body>

    <div class="boton">
        <button onclick="menu()" class="apa"><span style="color: rgba(15, 170, 33, 0.847);">Menu</span></button>
        <div id="menu" class="caida">
            <a href="#Iniciar_sesión"> <span style="color: rgb(13, 218, 245);">Iniciar Sesión</span></a>
            <a href="#Equipo"> <span style="color: rgb(32, 2, 140);">Equipo</span></a>
            <a href="#Unirse_grupo"><span style="color: rgb(19, 11, 110);">¡Unete al equipo!</span></a>
            <a href="#Manual"><span style="color: rgba(246, 30, 6, 0.71);">Manual</span></a>
        </div> 
    </div>

    <div class="card">
        <h1>Bienvenido a mi rincón</h1>
    </div>

    <div class="carf">
        <h1>Recientes</h1>
        <p>Se agregaron nuevas características. ¡0 manuales, 0 miembros y más!</p>
    </div>

    <div class="cars">
        <h1>Curriculum</h1>
        <hr>
        <h2><span style="color: rgb(66, 148, 250);">Información de nuevos proyectos en mi GitHub</span></h2>
        <a href="https://github.com/Comuza" target="_blank" style="text-decoration: none;">
            <span style="color: rgb(123, 120, 159);">Tocame te lo EXIJO</span>
        </a>
        <hr>
        <h3><span style="color: rgb(123, 86, 34);">Experiencia laboral, Curriculum y más...</span></h3> 
        <a href="https://www.linkedin.com/in/comuza-developer-b93bb73b8/" target="_blank" style="text-decoration: none;">
            <span style="color: rgb(123, 120, 159);">Linkedin</span>
        </a>
    </div>

    <script>
        function menu() {
            document.getElementById("menu").classList.toggle("show");
        }
    </script>

</body>
</html>
