<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackComuza RADIACIÓN</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #000000; 
            color: #00ff00;  /* VERDE NEÓN */
            text-align: center; 
            padding: 50px; 
        }
        h1 { 
            color: #ffff00;  /* AMARILLO NEÓN */
            font-size: 3rem; 
            text-shadow: 3px 3px 0 #ff00ff;  /* Sombra magenta */
            border-bottom: 4px solid #00ff00;
            display: inline-block;
        }
        .card { 
            background: #111111; 
            border: 4px solid #ffff00; 
            padding: 20px; 
            border-radius: 0px; 
            display: inline-block; 
            box-shadow: 0 0 30px #00ff00;
        }
        p { 
            color: #ff00ff;  /* MAGENTA */
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>¡Bienvenido a BlackSmocking!</h1>
        <p>El gran rincon</p>
        <p>donde nadie toca pasto...</p>
        <p style="color: #00ff00;">⚡ MODO RADIACTIVO ⚡</p>
    </div>
</body>
</html>
