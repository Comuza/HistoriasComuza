<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Kerolmi!</title>
    
    <style>
        body {
            background-color: rgb(56, 1, 10);
            color: rgb(79, 87, 34);
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
        }
        
        @keyframes tarjetaAnimada {
            0% {
                opacity: 0;
                transform: translateY(80px) scale(0.8);
            }
            50% {
                opacity: 1;
                transform: translateY(-15px) scale(1.02);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        @keyframes botonPulso {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(89, 3, 228, 0.256);
            }
            50% {
                transform: scale(.99);
                box-shadow: 0 0 0 12px rgba(15, 170, 33, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(15, 170, 33, 0);
            }
        }
        
        @keyframes tituloVibra {
            0% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
            100% { transform: translateX(0); }
        }

        @keyframes texto {
            0% {
                opacity: 0;
            }
            25% {
                opacity: 0.25;
                transform: rotate(45deg);
            }
            50% {
                transform: rotate(90deg);
                opacity: 0.50;
                font-size: 30px;
            }
            75% {
                opacity: 0.75;
                transform: rotate(135deg);
                font-size: 25px;
            }
            100% {
                opacity: 0.75;
                transform: rotate(0deg);
                font-size: 20px;
            }
        }

        .texto {
            display: inline-block;
            font-weight: normal;
            animation-name: texto;
            animation-duration: 4s;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }
        
        .card, .carf, .cars {
            background-color: rgb(25, 23, 55);
            border: 1px solid rgb(79, 87, 34);
            margin: 20px auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            animation: tarjetaAnimada 0.7s ease-out forwards;
            opacity: 0;
        }

        .card { 
            border-radius: 24px; 
            padding: 20px; 
            max-width: 400px;
            animation-delay: 0.1s;
        }
        
        .carf { 
            border-radius: 16px; 
            min-height: 129px; 
            max-width: 800px; 
            margin: 60px auto;
            animation-delay: 0.3s;
        }

        .cars { 
            border-radius: 50px; 
            max-width: 800px; 
            margin: 60px auto; 
            padding-bottom: 20px;
            animation-delay: 0.5s;
        }
        
        h1 {
            animation: tituloVibra 0.5s ease 2;
        }

        .apa {
            background-color: rgb(77, 77, 77);
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            animation: botonPulso 2s infinite;
        }
        
        .apa:hover {
            background-color: rgba(15, 170, 33, 0.19);
            transform: scale(1.1);
            animation: none;
        }

        .caida {
            display: none;
            position: fixed;
            right: 0;
            top: 50px;
            left: auto;   
            margin: 0;
            background-color: rgb(0, 0, 0);
            min-width: 160px;
            border: 1px solid rgb(255, 255, 255);
            z-index: 100;
            text-align: left;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
            transform: translateX(100px) rotate(-5deg);
        }

        .caida.show {
            display: block;
            opacity: 1;
            transform: translateX(0) rotate(0deg);
        }

        .caida a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            transition: all 0.3s ease;
        }

        .caida a:hover {
            background-color: rgb(29, 15, 15);
            padding-left: 24px;
        }

        .show {
            display: block;
        }

        .boton {
            position: fixed;
            top: 0;
            right: 0;
            margin: 0;
            z-index: 101;
            margin-left: auto;
            margin-right: 0;
            margin-bottom: 20px;
            width: fit-content;
            transition: all 1.3s ease;
        }
    </style>
</head>
<body>

    <div class="boton">
        <button onclick="menu()" class="apa"><span style="color: rgba(15, 170, 33, 0.847);">Menu</span></button>
        <div id="menu" class="caida">
            <a href="Iniciar_sesion.html" target="_blank"> <span style="color: rgb(13, 218, 245);">Iniciar Sesión</span></a>
            <a href="#Equipo"> <span style="color: rgb(32, 2, 140);">Equipo</span></a>
            <a href="#Unirse_grupo"><span style="color: rgb(19, 11, 110);">¡Unete al equipo!</span></a>
            <a href="Manul.html" target="_blank"><span style="color: rgba(246, 30, 6, 0.71);">Manual</span></a>
        </div> 
    </div>

    <div class="card">
        <h1>Bienvenido a mi rincón</h1>
    </div>

    <div class="carf">
        <h1>Recientes</h1>
        <p class="texto">Se agregaron nuevas características. ¡0 manuales, 0 miembros y más!</p>
    </div>

    <div class="cars">
        <h1>Curriculum</h1>
        <hr>
        <h2><span style="color: rgb(66, 148, 250);">Información de nuevos proyectos en mi GitHub</span></h2>
        <a href="https://github.com/Comuza" target="_blank" style="text-decoration: none;">
            <span style="color: rgb(123, 120, 159);">Tocame te lo EXIJO</span>
        </a>
        <hr>
        <h3><span style="color: rgb(123, 86, 34);">Experiencia laboral, Curriculum y más...</span></h3> 
        <a href="https://www.linkedin.com/in/comuza-developer-b93bb73b8/" target="_blank" style="text-decoration: none;">
            <span style="color: rgb(123, 120, 159);">Linkedin</span>
        </a>
    </div>

    <script>
        function menu() {
            document.getElementById("menu").classList.toggle("show");
        }
    </script>

</body>
</html>
